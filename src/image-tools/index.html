<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像変換・圧縮ツール | Gravity Portal</title>
    <meta name="description" content="ブラウザ完結で画像フォーマット変換（PNG/JPEG/WebP）、リサイズ、圧縮が可能。ファイルはサーバーに送信されません。">
    <link rel="stylesheet" href="image-tools.css">
</head>

<body>
    <div id="app">
        <header class="tool-header">
            <h1 class="tool-title">🖼️ 画像変換・圧縮</h1>
            <p class="tool-subtitle">PNG / JPEG / WebP の変換・リサイズ・圧縮 — ブラウザ完結・ファイル送信なし</p>
        </header>

        <!-- ドロップゾーン -->
        <div class="drop-zone" id="drop-zone">
            <div class="drop-icon">📁</div>
            <p class="drop-text">画像をドラッグ＆ドロップ</p>
            <p class="drop-sub">または <label for="file-input" class="file-label">ファイルを選択</label></p>
            <input type="file" id="file-input" accept="image/*" multiple hidden>
            <p class="drop-hint">PNG / JPEG / WebP / GIF / BMP / SVG 対応</p>
        </div>

        <!-- 変換設定パネル -->
        <div class="settings-panel hidden" id="settings-panel">
            <div class="settings-row">
                <div class="setting-group">
                    <label for="format-select">出力フォーマット</label>
                    <select id="format-select">
                        <option value="webp">WebP</option>
                        <option value="jpeg">JPEG</option>
                        <option value="png">PNG</option>
                        <option value="avif">AVIF (次世代)</option>
                        <option value="ico">ICO (favicon)</option>
                        <option value="base64">Base64 テキスト</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="quality-slider">品質: <span id="quality-value">85</span>%</label>
                    <input type="range" id="quality-slider" min="1" max="100" value="85">
                    <div class="quality-hints">
                        <span>低品質・小サイズ</span>
                        <span>高品質・大サイズ</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="resize-select">リサイズ</label>
                    <select id="resize-select">
                        <option value="none">変更なし</option>
                        <option value="1920">最大幅 1920px</option>
                        <option value="1280">最大幅 1280px</option>
                        <option value="1024">最大幅 1024px</option>
                        <option value="800">最大幅 800px</option>
                        <option value="640">最大幅 640px</option>
                        <option value="custom">カスタム</option>
                    </select>
                </div>
                <div class="setting-group hidden" id="custom-size-group">
                    <label for="custom-width">幅 (px)</label>
                    <input type="number" id="custom-width" min="1" max="10000" value="800" placeholder="幅">
                </div>
            </div>
            <div class="settings-actions">
                <button class="btn-primary" id="convert-btn">🔄 一括変換</button>
                <button class="btn-secondary" id="clear-btn">🗑️ クリア</button>
            </div>
        </div>

        <!-- ファイル一覧 -->
        <div class="file-list hidden" id="file-list">
            <div class="file-list-header">
                <span class="file-count" id="file-count">0 ファイル</span>
                <span class="total-size" id="total-size"></span>
            </div>
            <div class="file-items" id="file-items"></div>
        </div>

        <!-- 結果 -->
        <div class="results hidden" id="results">
            <div class="results-header">
                <h2 class="results-title">✅ 変換結果</h2>
                <div class="results-summary" id="results-summary"></div>
                <button class="btn-primary" id="download-all-btn">📦 すべてダウンロード</button>
            </div>
            <div class="result-items" id="result-items"></div>
        </div>

        <!-- フッター -->
        <footer class="tool-footer">
            <p>🔒 すべての処理はブラウザ内で完結。画像がサーバーに送信されることはありません。</p>
            <p class="footer-link"><a href="https://antigravity-portal.com">Gravity Portal</a> の便利ツール</p>
        </footer>
    </div>
    <script src="image-tools.js"></script>
</body>

</html>
