name: Bluesky 自動投稿

on:
  schedule:
    # 毎日 9:00 / 15:00 / 21:00 JST（UTC: 0:00 / 6:00 / 12:00）に実行
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:  # 手動実行にも対応

permissions:
  contents: write  # posted-items.json をコミットするため

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ブログ + Note 新着を Bluesky に投稿
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          NOTE_USERNAME: hahu1124
        run: node scripts/post-to-bluesky.mjs

      - name: 投稿済みリストをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted-items.json
          git diff --cached --quiet || git commit -m "🤖 Bluesky投稿済みリスト更新" && git push
